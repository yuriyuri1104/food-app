<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? - 학교 급식 조회</title>
    <!-- Tailwind CSS (디자인을 위해 사용) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 웹폰트 적용 (나눔스퀘어 네오) */
        @import url('https://webfontworld.github.io/NanumSquareNeo/NanumSquareNeo.css');
        body {
            font-family: 'NanumSquareNeo', sans-serif;
            background-color: #f0fdfa; /* 아주 연한 파란색/청록색 배경 */
        }
        /* 날짜 선택기 기본 스타일 수정 */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen flex justify-center text-slate-800">

    <!-- 모바일 화면 크기에 맞춘 메인 컨테이너 -->
    <div class="w-full max-w-md bg-white shadow-xl min-h-screen relative overflow-hidden">
        
        <!-- 상단 헤더 (파란색) -->
        <header class="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md">
            <h1 class="text-2xl font-extrabold mb-1">우리학교 급식 🍱</h1>
            <p class="text-blue-200 text-sm">맛있고 건강한 점심시간!</p>
        </header>

        <!-- 날짜 선택 영역 -->
        <div class="p-6 pb-2">
            <label for="date-picker" class="block text-sm font-bold text-slate-500 mb-2">날짜를 선택하세요</label>
            <div class="relative">
                <input type="date" id="date-picker" 
                       class="w-full bg-blue-50 border-2 border-blue-200 text-blue-900 rounded-xl px-4 py-3 font-semibold focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all">
            </div>
        </div>

        <!-- 급식 메뉴 표시 영역 -->
        <div class="p-6" id="menu-container">
            <!-- 자바스크립트를 통해 이곳에 메뉴가 렌더링됩니다. -->
        </div>

        <!-- 알레르기 정보 안내 (하단) -->
        <div class="p-6 bg-slate-50 border-t border-slate-100 mt-4 text-xs text-slate-500 leading-relaxed pb-12">
            <p class="font-bold mb-2 flex items-center text-slate-600">
                <svg class="w-4 h-4 mr-1 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                알레르기 정보 안내
            </p>
            1.난류 2.우유 3.메밀 4.땅콩 5.대두 6.밀 7.고등어 8.게 9.새우 10.돼지고기 11.복숭아 12.토마토 13.아황산염 14.호두 15.닭고기 16.쇠고기 17.오징어 18.조개류 19.잣
        </div>
    </div>

    <!-- JavaScript 로직 -->
    <script>
        // 1. 임시 데이터 (5일치 샘플 메뉴)
        // 키 값은 'YYYY-MM-DD' 형식의 날짜입니다.
        const mealData = {
            '2026-07-06': [
                { name: '혼합잡곡밥', allergies: [] },
                { name: '쇠고기미역국', allergies: [16] },
                { name: '매운돼지갈비찜', allergies: [5, 6, 10] },
                { name: '숙주나물무침', allergies: [] },
                { name: '배추김치', allergies: [9] },
                { name: '우유', allergies: [2] }
            ],
            '2026-07-07': [
                { name: '기장밥', allergies: [] },
                { name: '닭개장', allergies: [15] },
                { name: '순살삼치구이', allergies: [7] },
                { name: '도토리묵무침', allergies: [5, 6] },
                { name: '깍두기', allergies: [9] },
                { name: '사과', allergies: [] }
            ],
            '2026-07-08': [
                { name: '치킨마요덮밥', allergies: [1, 5, 6, 15] },
                { name: '유부맑은장국', allergies: [5, 6] },
                { name: '국물떡볶이', allergies: [1, 5, 6] },
                { name: '수제김말이튀김', allergies: [1, 5, 6] },
                { name: '단무지', allergies: [] },
                { name: '요구르트', allergies: [2] }
            ],
            '2026-07-09': [
                { name: '현미밥', allergies: [] },
                { name: '돼지고기김치찌개', allergies: [5, 9, 10] },
                { name: '계란말이', allergies: [1] },
                { name: '멸치아몬드볶음', allergies: [5, 6, 14] },
                { name: '구이김', allergies: [] }
            ],
            '2026-07-10': [
                { name: '짜장면', allergies: [5, 6, 10] },
                { name: '얼큰짬뽕국', allergies: [9, 17, 18] },
                { name: '찹쌀탕수육', allergies: [1, 5, 6, 10] },
                { name: '짜사이무침', allergies: [] },
                { name: '배추김치', allergies: [9] }
            ]
        };

        // DOM 요소 가져오기
        const datePicker = document.getElementById('date-picker');
        const menuContainer = document.getElementById('menu-container');

        // 초기 화면 설정 (샘플 데이터가 있는 날짜로 기본 세팅)
        const defaultDate = '2026-07-08'; 
        datePicker.value = defaultDate;
        renderMenu(defaultDate);

        // 날짜가 변경될 때마다 급식 메뉴 업데이트
        datePicker.addEventListener('change', (e) => {
            renderMenu(e.target.value);
        });

        // 메뉴를 화면에 그려주는 함수
        function renderMenu(date) {
            const menus = mealData[date];
            
            // 데이터가 없을 경우
            if (!menus) {
                menuContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-slate-400">
                        <svg class="w-16 h-16 mb-4 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="font-medium text-lg">해당 날짜의 급식 정보가 없습니다.</p>
                        <p class="text-sm mt-1">다른 날짜를 선택해 보세요!</p>
                        <p class="text-xs mt-3 text-blue-400">※ 샘플 데이터: 2026-07-06 ~ 2026-07-10</p>
                    </div>
                `;
                return;
            }

            // 데이터가 있을 경우 HTML 생성
            let menuHTML = `<div class="space-y-3 mt-2">`;
            
            menus.forEach(item => {
                // 알레르기 배지 생성
                let allergyBadges = '';
                if (item.allergies && item.allergies.length > 0) {
                    item.allergies.forEach(num => {
                        allergyBadges += `<span class="inline-block bg-rose-100 text-rose-600 text-[10px] font-bold px-1.5 py-0.5 rounded ml-1 border border-rose-200">${num}</span>`;
                    });
                }

                // 아이콘 (알레르기 유무에 따라)
                const iconSVG = (item.allergies && item.allergies.length > 0) 
                    ? `<svg class="w-5 h-5 text-rose-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`
                    : `<svg class="w-5 h-5 text-green-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;

                menuHTML += `
                    <div class="flex items-center justify-between bg-white border border-blue-50 p-4 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex items-center">
                            ${iconSVG}
                            <span class="font-bold text-slate-700 text-lg">${item.name}</span>
                        </div>
                        <div>
                            ${allergyBadges}
                        </div>
                    </div>
                `;
            });

            menuHTML += `</div>`;
            menuContainer.innerHTML = menuHTML;
        }
    </script>
</body>
</html>
